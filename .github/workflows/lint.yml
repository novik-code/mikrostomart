name: Lint + TypeScript

# S9-2 (Hotfix Sprint, 2026-05-18): CI gate so we don't regress past the
# baseline of 1525 pre-existing lint errors. `npm run lint:ci` compares the
# current eslint output against .eslint-baseline.json (committed snapshot)
# and exits non-zero on:
#   - any file in the baseline gaining errors
#   - any new file with errors
# See scripts/lint-baseline.mjs for the comparison logic.
#
# tsc --noEmit also runs here — TypeScript currently passes clean, and we
# want CI to keep it that way.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-flight runs when a new commit lands on the same ref.
# cancel-in-progress: false (2026-05-21) — `true` powodowało że szybkie sekwencje
# push'ów (np. perf optimization sprints A→B→C) cancelowały pośrednie runs,
# które pojawiały się jako "Failed" w GitHub UI z exit code 128 (git checkout
# cancelled) + npm error (no files). Mylące. False = każdy push dostaje pełen
# run, ostatni dla danego ref jest źródłem prawdy o stanie main.
concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: false

jobs:
  lint:
    name: ESLint baseline + tsc
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint baseline gate
        run: npm run lint:ci

      - name: TypeScript check
        run: npx tsc --noEmit
